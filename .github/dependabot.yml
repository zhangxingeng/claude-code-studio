version: 2
updates:
  # Frontend deps (pnpm) — dependabot detects pnpm-lock.yaml automatically
  # under the "npm" ecosystem.
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    groups:
      frontend-minor-patch:
        update-types:
          - 'minor'
          - 'patch'
    labels:
      - 'dependencies'
      - 'frontend'

  # Rust deps
  - package-ecosystem: 'cargo'
    directory: '/src-tauri'
    schedule:
      interval: 'weekly'
    groups:
      rust-minor-patch:
        update-types:
          - 'minor'
          - 'patch'
    labels:
      - 'dependencies'
      - 'rust'

  # Pin/refresh the GitHub Actions used in our own workflows.
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    groups:
      github-actions:
        update-types:
          - 'minor'
          - 'patch'
    labels:
      - 'dependencies'
      - 'ci'
